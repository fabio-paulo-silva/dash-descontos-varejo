<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Auditoria de Descontos · Gentil Negócios</title>
<style>
:root {
  /* ── Gentil Negócios Brand ─────────────────── */
  --bg:           #F2F5F8;
  --card:         #FFFFFF;
  --border:       #D4DCE6;
  --text:         #111827;
  --muted:        #64748B;
  /* Marinho – primary brand dark */
  --accent:       #162032;
  --accent2:      #28C76F;
  --accent-light: #E6F7EF;
  /* Verde marca – brand green */
  --brand-green:  #28C76F;
  --brand-green-bg:#E6F7EF;
  /* Gold → ciano (paleta secundária) */
  --gold:         #0EA5E9;
  --gold-bg:      #E0F4FF;
  /* Status */
  --green:        #16A34A;  --green-bg:  #DCFCE7;
  --red:          #DC2626;  --red-bg:    #FEE2E2;
  --yellow:       #D97706;  --yellow-bg: #FEF3C7;
  --blue:         #2563EB;  --blue-bg:   #DBEAFE;
  --teal:         #0D9488;  --teal-bg:   #CCFBF1;
  --orange:       #EA580C;  --orange-bg: #FFEDD5;
  /* Tipo desconto */
  --promo:        #2563EB;  --promo-bg:  #EEF2FF;
  --fid:          #7C3AED;  --fid-bg:    #F5F3FF;
  /* Grupos de tag */
  --g-venc:       #0D9488;  --g-venc-bg: #CCFBF1;
  --g-vic:        #D97706;  --g-vic-bg:  #FEF3C7;
  --g-imp:        #2563EB;  --g-imp-bg:  #DBEAFE;
  --g-colab:      #EA580C;  --g-colab-bg:#FFEDD5;
  --g-outros:     #64748B;  --g-outros-bg:#F1F5F9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ── Header ───────────────────────────────── */
header{background:linear-gradient(135deg,#162032 0%,#1E3547 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 10px rgba(22,32,50,.4);border-bottom:3px solid var(--brand-green)}
header h1{font-size:17px;font-weight:700;letter-spacing:.01em}
header h1 span{opacity:.75;font-weight:400;font-size:13px;margin-left:8px}
#meta-header{font-size:11px;opacity:.8;text-align:right;white-space:nowrap;line-height:1.6}

main{max-width:1440px;margin:0 auto;padding:16px 14px 56px}

/* ── Filter bar ───────────────────────────── */
.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.filter-group select,.filter-group input[type=date]{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;background:var(--bg);color:var(--text);min-width:140px}
.filter-group select:focus,.filter-group input[type=date]:focus{outline:none;border-color:var(--accent)}
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.filter-results{font-size:12px;color:var(--muted);align-self:center;margin-left:auto}
.periodo-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:12px;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.periodo-bar strong{color:var(--text)}

/* ── Multi-select ─────────────────────────── */
.ms-wrap{position:relative;min-width:200px}
.ms-trigger{border:1px solid var(--border);border-radius:6px;padding:6px 10px;background:var(--bg);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:6px;min-width:200px;user-select:none}
.ms-trigger:hover,.ms-trigger.open{border-color:var(--accent)}
.ms-arrow{font-size:10px;color:var(--muted);transition:transform .15s}
.ms-trigger.open .ms-arrow{transform:rotate(180deg)}
.ms-dropdown{position:absolute;top:calc(100% + 4px);left:0;z-index:300;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.13);width:320px;display:flex;flex-direction:column;max-height:360px;overflow:hidden}
.ms-search-inp{padding:8px 12px;border:none;border-bottom:1px solid var(--border);font-size:13px;outline:none;width:100%}
.ms-list{overflow-y:auto;flex:1}
.ms-group-header{padding:5px 12px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0}
.ms-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px}
.ms-item:hover{background:var(--accent-light)}
.ms-item input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.ms-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-footer{padding:6px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}
.ms-footer a{color:var(--accent);cursor:pointer}
.ms-footer a:hover{text-decoration:underline}
.ms-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;max-width:420px}
.ms-chip{background:var(--accent-light);color:var(--accent);border-radius:99px;padding:2px 8px;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.ms-chip:hover{background:#f3d9e4}

/* ── Section titles ───────────────────────── */
.section-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:14px;background:var(--brand-green);border-radius:2px;flex-shrink:0}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── KPI cards ───────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--accent))}
.kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi .value{font-size:21px;font-weight:700;line-height:1.1;color:var(--kpi-color,var(--text))}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi.c-navy{--kpi-color:var(--accent)}.kpi.c-wine{--kpi-color:var(--accent)}.kpi.c-brand{--kpi-color:var(--brand-green)}
.kpi.c-red{--kpi-color:var(--red)}
.kpi.c-green{--kpi-color:var(--green)}
.kpi.c-blue{--kpi-color:var(--blue)}
.kpi.c-teal{--kpi-color:var(--teal)}
.kpi.c-orange{--kpi-color:var(--orange)}
.kpi.c-gold{--kpi-color:var(--gold)}
.kpi.c-promo{--kpi-color:var(--promo)}
.kpi.c-fid{--kpi-color:var(--fid)}

/* ── Saving hero card ─────────────────────── */
.kpi-saving-hero{background:linear-gradient(135deg,#064e3b,#065f46);color:#fff;border-radius:10px;padding:16px;position:relative;overflow:hidden;grid-column:span 2}
.kpi-saving-hero .label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;opacity:.8;margin-bottom:6px}
.kpi-saving-hero .value{font-size:26px;font-weight:700;line-height:1.1}
.kpi-saving-hero .sub{font-size:11px;opacity:.7;margin-top:4px}
.kpi-saving-hero .hero-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.hero-badge{display:inline-flex;align-items:center;background:rgba(255,255,255,.2);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700}

/* ── Saving panel ─────────────────────────── */
.saving-panel{background:linear-gradient(135deg,#064e3b,#065f46);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:4px}
.saving-panel h2{font-size:14px;font-weight:700;margin-bottom:14px;opacity:.9}
.saving-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
.saving-kpi{background:rgba(255,255,255,.12);border-radius:8px;padding:12px 14px}
.saving-kpi .label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;opacity:.75;margin-bottom:5px}
.saving-kpi .value{font-size:20px;font-weight:700}
.saving-kpi .sub{font-size:10px;opacity:.65;margin-top:3px}
.saving-kpi.highlight{background:rgba(255,255,255,.22)}
.saving-note{font-size:11px;opacity:.6;margin-top:12px}

/* ── Efficiency cards ─────────────────────── */
.eff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px}
.eff-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.eff-card .eff-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.eff-card .eff-value{font-size:18px;font-weight:700}
.eff-bar{height:6px;background:var(--border);border-radius:99px;margin-top:8px;overflow:hidden}
.eff-bar-fill{height:100%;border-radius:99px}

/* ── Section card ────────────────────────── */
.section-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px}
.section-card h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}

/* ── Alert sections ──────────────────────── */
.alert-section{margin-bottom:16px}
.alert-section-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.alert-count-badge{background:var(--red-bg);color:var(--red);border-radius:99px;padding:1px 8px;font-size:11px;font-weight:700}
.alert-count-badge.warn{background:var(--yellow-bg);color:var(--yellow)}
.alert-count-badge.promo{background:var(--promo-bg);color:var(--promo)}
.alert-count-badge.fid{background:var(--fid-bg);color:var(--fid)}

/* ── Tabs ─────────────────────────────────── */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s}
.tab.active{color:var(--accent);border-color:var(--brand-green)}
.tab:hover:not(.active){color:var(--text)}

/* ── Tables ───────────────────────────────── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg);padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:#FAFAF9}
tbody tr.alerta-row{background:#FFF0F0}
tbody tr.alerta-crit-row{background:#FEE2E2}
tbody tr.venc-row{background:#F0FDF8}
tbody tr.promo-row{background:#EFF4FF}
tbody tr.fid-row{background:#F8F5FF}
tbody td{padding:8px 12px;vertical-align:middle}

/* ── Badges ───────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-wine{background:var(--accent-light);color:var(--accent)}
.badge-teal{background:var(--teal-bg);color:var(--teal)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-gold{background:var(--gold-bg);color:var(--gold)}
.badge-promo{background:var(--promo-bg);color:var(--promo)}
.badge-fid{background:var(--fid-bg);color:var(--fid)}
/* Tag group badges */
.badge-g-venc{background:var(--g-venc-bg);color:var(--g-venc)}
.badge-g-vic{background:var(--g-vic-bg);color:var(--g-vic)}
.badge-g-impgn{background:#E0F2FE;color:#0369A1}
.badge-g-imp{background:var(--g-imp-bg);color:var(--g-imp)}
.badge-g-colab{background:var(--g-colab-bg);color:var(--g-colab)}
.badge-g-liq{background:#FEF9C3;color:#854D0E}
.badge-g-evt{background:#F3E8FF;color:#7C3AED}
.badge-g-outros{background:var(--g-outros-bg);color:var(--g-outros)}

/* ── Bar ──────────────────────────────────── */
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:99px;background:var(--brand-green)}
.bar-fill.green{background:var(--green)}
.bar-fill.red{background:var(--red)}
.bar-fill.teal{background:var(--teal)}
.bar-fill.promo{background:var(--promo)}
.bar-fill.fid{background:var(--fid)}
.bar-fill.gold{background:var(--gold)}

/* ── Search row ───────────────────────────── */
.search-row{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.search-row input{border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:13px;width:260px}
.search-row input:focus{outline:none;border-color:var(--accent)}
.search-row .count{font-size:12px;color:var(--muted)}

/* ── Pagination ───────────────────────────── */
.pagination{display:flex;gap:5px;align-items:center;justify-content:flex-end;padding:9px 12px;border-top:1px solid var(--border);flex-wrap:wrap}
.pagination button{border:1px solid var(--border);background:var(--card);border-radius:5px;padding:4px 10px;cursor:pointer;font-size:12px}
.pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pagination span{font-size:12px;color:var(--muted)}

/* ── Top lists ───────────────────────────── */
.top-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.top-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.top-card-title{padding:10px 14px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border)}
.top-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px}
.top-item:last-child{border-bottom:none}
.top-rank{width:22px;text-align:center;font-weight:700;color:var(--muted);font-size:11px;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-info .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-info .sub{color:var(--muted);font-size:11px}
.top-val{font-weight:700;white-space:nowrap;font-size:12px}

/* ── State / empty ───────────────────────── */
.state{text-align:center;padding:60px 20px;color:var(--muted)}
.state .icon{font-size:40px;margin-bottom:12px}
.empty-row td{text-align:center;padding:30px;color:var(--muted)}

/* ── Layout sidebar ───────────────────────── */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#162032;color:#fff;position:fixed;left:0;top:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo .brand{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
.sidebar-logo .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.sidebar-nav{padding:8px 0;flex:1}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);padding:12px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:background .15s,color .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(40,199,111,.12);color:#28C76F;border-left-color:#28C76F;font-weight:600}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.4);line-height:1.6}
.main-wrapper{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Auditoria page ───────────────────────── */
.audit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.audit-kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.audit-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--accent))}
.audit-kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.audit-kpi .value{font-size:22px;font-weight:700;color:var(--kpi-color,var(--text))}
.audit-kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}
.audit-kpi.c-green{--kpi-color:var(--green)}
.audit-kpi.c-red{--kpi-color:var(--red)}
.audit-kpi.c-yellow{--kpi-color:var(--yellow)}
.audit-kpi.c-blue{--kpi-color:var(--blue)}
.audit-kpi.c-brand{--kpi-color:var(--brand-green)}
.vazao-bar-wrap{display:flex;align-items:center;gap:8px}
.vazao-bar{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;min-width:60px}
.vazao-fill{height:100%;border-radius:99px;transition:width .3s}
.transgression-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.tb-nao-listado{background:#FEE2E2;color:#B91C1C}
.tb-excesso{background:#FEF3C7;color:#D97706}
.tb-ok{background:#DCFCE7;color:#16A34A}
.tb-sem-venda{background:#F1F5F9;color:#64748B}

@media(max-width:900px){
  .sidebar{width:60px}
  .sidebar .brand,.sidebar .sub,.nav-item span:not(.nav-icon),.nav-section,.sidebar-footer{display:none}
  .nav-item{padding:12px;justify-content:center}
  .main-wrapper{margin-left:60px}
}
@media(max-width:640px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .kpi-saving-hero{grid-column:span 1}
  header h1{font-size:14px}
  table{font-size:11px}
}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="brand">🛍️ Gentil Negócios</div>
    <div class="sub">Auditoria de Descontos</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Análise</div>
    <div class="nav-item active" id="nav-dashboard" onclick="setPage('dashboard')">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </div>
    <div class="nav-item" id="nav-auditoria" onclick="setPage('auditoria')">
      <span class="nav-icon">🔍</span><span>Auditoria</span>
    </div>
  </nav>
  <div class="sidebar-footer" id="sidebar-footer">Carregando...</div>
</aside>
<div class="main-wrapper">
<header>
  <h1>🛍️ Auditoria de Descontos <span>· Gentil Negócios</span></h1>
  <div id="meta-header">Carregando...</div>
</header>
<main>
  <div id="filter-section"></div>
  <div id="data-section"><div class="state"><div class="icon">⏳</div><div>Carregando dados...</div></div></div>
</main>
</div>
</div>
<script>
// ── Formatters ────────────────────────────────────────────────────
const R  = v => 'R$ ' + (+v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const P  = v => (+v||0).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
const N  = v => (+v||0).toLocaleString('pt-BR');
const esc= s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function parseDate(s){ if(!s) return null; const [d,m,y]=s.split('/'); return new Date(+y,+m-1,+d); }
function monthKey(s){ if(!s) return ''; const p=s.split('/'); return p[2]+'-'+p[1]; }
function monthLabel(k){ if(!k) return k; const [y,m]=k.split('-'); return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+m-1]+'/'+y.slice(2); }
function sortRows(rows,col,asc){ return [...rows].sort((a,b)=>{ let va=a[col]||0,vb=b[col]||0; if(typeof va==='string') return asc?String(va).localeCompare(String(vb),'pt-BR'):String(vb).localeCompare(String(va),'pt-BR'); return asc?(va-vb):(vb-va); }); }

// ── Constantes ────────────────────────────────────────────────────
const VENC_KEYWORDS = ['VENCIMENTO','VENC','PROXIMO','PROX','VENCI','VALIDADE'];
const isVenc = tag => VENC_KEYWORDS.some(k => (tag||'').toUpperCase().includes(k));

const TAG_GROUPS = [
  { id:'vencimento', label:'Venc. Próximo',     badge:'badge-g-venc',  keywords:['VENCIMENTO','VENC','PROXIMO','PROX','VENCI','VALIDADE'] },
  { id:'vic',        label:'VIC',               badge:'badge-g-vic',   keywords:['VIC'] },
  { id:'impgn',      label:'IMP GN',            badge:'badge-g-impgn', keywords:['IMP GN','IMPGN','GN]','[GN'] },
  { id:'impulsiona', label:'Impulsiona Varejo', badge:'badge-g-imp',   keywords:['[IMP]','IMPULSIONA','IMPULSO','IMPULS'] },
  { id:'colaborador',label:'Colaborador',       badge:'badge-g-colab', keywords:['COLABORADOR','COLAB','FUNCIO','FUNCIONARIO'] },
  { id:'liquidacao', label:'Liquidação',        badge:'badge-g-liq',   keywords:['LIQUIDACAO','LIQUIDA','SALDAO','OUTLET'] },
  { id:'evento',     label:'Evento / Sazonal',  badge:'badge-g-evt',   keywords:['BLACK','NATAL','VERAO','INVERNO','PASCOA','DIA DAS','ANIVER'] },
];
function getTagGroup(tag){
  const t = (tag||'').toUpperCase();
  for(const g of TAG_GROUPS){ if(g.keywords.some(k=>t.includes(k))) return g; }
  return { id:'outros', label:'Outros', badge:'badge-g-outros' };
}
function tagGroupBadge(tag){ const g=getTagGroup(tag); return '<span class="badge '+g.badge+'" style="font-size:10px">'+g.label+'</span>'; }

// ── Estado ────────────────────────────────────────────────────────
let RAW=null, D=null, activeTab='campanhas', sortState={};
const PAGE_SIZE=50;
let pages={campanhas:1,lojas:1,itens:1,alertas:1,vencimento:1,promo:1,fidelidade:1};
let searches={itens:'',alertas:'',vencimento:'',promo:'',fidelidade:'',auditoria_t:'',auditoria_v:''};
let F={mes:'',dataIni:'',dataFim:'',tags:[],grupo:''};
let msOpen=false, msSearch='';

// ── Multi-select helpers ──────────────────────────────────────────
function getAllTags(){ if(!RAW) return []; return [...new Set(RAW.itens_todos.map(i=>i.tag).filter(Boolean))].sort(); }

function toggleMS(e){ if(e) e.stopPropagation(); msOpen=!msOpen; const dd=document.getElementById('ms-dropdown'),tr=document.getElementById('ms-trigger'); if(!dd||!tr) return; dd.style.display=msOpen?'flex':'none'; tr.className='ms-trigger'+(msOpen?' open':''); if(msOpen){ const inp=document.getElementById('ms-search-inp'); if(inp) setTimeout(()=>inp.focus(),50); } }
function filterMSTags(q){ msSearch=q; renderMSList(); }

function renderMSList(){
  const list=document.getElementById('ms-list'); if(!list) return;
  const allTags=getAllTags();
  const q=msSearch.toLowerCase();
  const filtered=q?allTags.filter(t=>t.toLowerCase().includes(q)):allTags;
  if(!filtered.length){ list.innerHTML='<div style="padding:12px;color:var(--muted);font-size:12px;text-align:center">Nenhuma tag encontrada</div>'; return; }

  // Group tags
  const grouped={};
  filtered.forEach(t=>{ const g=getTagGroup(t); if(!grouped[g.id]) grouped[g.id]={group:g,tags:[]}; grouped[g.id].tags.push(t); });
  const order=['vencimento','vic','impulsiona','colaborador','outros'];

  let html='';
  order.forEach(gid=>{ if(!grouped[gid]) return;
    const {group,tags}=grouped[gid];
    html+='<div class="ms-group-header"><span class="badge '+group.badge+'" style="font-size:9px">'+group.label+'</span></div>';
    tags.forEach(t=>{
      const vid='ms-'+Math.abs(t.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0)).toString(36);
      html+='<label class="ms-item" onclick="event.stopPropagation()">'
        +'<input type="checkbox" id="'+vid+'" '+(F.tags.includes(t)?'checked':'')
        +' onchange="toggleTag(\''+esc(t)+'\')" onclick="event.stopPropagation()">'
        +'<span class="ms-item-label" title="'+esc(t)+'">'+esc(t)+'</span>'
        +'</label>';
    });
  });
  list.innerHTML=html;
  const fc=document.getElementById('ms-footer-count'); if(fc) fc.textContent=filtered.length+' de '+allTags.length;
}

function updateMSTrigger(){
  const lbl=document.getElementById('ms-trigger-label'); if(!lbl) return;
  lbl.textContent=F.tags.length===0?'Todas as tags':F.tags.length+' tag'+(F.tags.length>1?'s':'')+' selecionada'+(F.tags.length>1?'s':'');
  const chips=document.getElementById('ms-chips'); if(!chips) return;
  chips.innerHTML=F.tags.map(t=>'<span class="ms-chip" onclick="event.stopPropagation();toggleTag(\''+esc(t)+'\')">'+esc(t)+' <span style="opacity:.7">✕</span></span>').join('');
  const fr=document.getElementById('filter-results'); if(fr&&D) fr.textContent=N(D.itens.length)+' itens'+(F.mes||F.dataIni||F.dataFim||F.tags.length||F.grupo?' (filtrado)':'');
}

function toggleTag(tag){ const idx=F.tags.indexOf(tag); if(idx>=0) F.tags.splice(idx,1); else F.tags.push(tag); applyFilters(); updateMSTrigger(); renderMSList(); renderDataSection(); }
function clearAllTags(){ F.tags=[]; applyFilters(); updateMSTrigger(); renderMSList(); renderDataSection(); }

// ── Filters ───────────────────────────────────────────────────────
function applyFilters(){
  if(!RAW) return;
  let manual=RAW.itens_todos;
  if(F.mes)     manual=manual.filter(i=>monthKey(i.data)===F.mes);
  if(F.dataIni){ const ini=new Date(F.dataIni); manual=manual.filter(i=>{const d=parseDate(i.data);return d&&d>=ini;}); }
  if(F.dataFim){ const fim=new Date(F.dataFim); manual=manual.filter(i=>{const d=parseDate(i.data);return d&&d<=fim;}); }
  if(F.tags.length) manual=manual.filter(i=>F.tags.includes(i.tag));
  if(F.grupo)   manual=manual.filter(i=>getTagGroup(i.tag).id===F.grupo);
  D=calcular(manual);
}

// ── Calcular ──────────────────────────────────────────────────────
function calcular(itens){
  const sum=(arr,f)=>arr.reduce((s,i)=>s+(+i[f]||0),0);
  const uniq=(arr,f)=>new Set(arr.map(i=>i[f])).size;
  // Promo e Fidelidade — pré-agregados no JSON, não dependem de filtros de tag/grupo
  const kraw=RAW.kpis||{};
  const por_campanha_promo  = RAW.por_campanha_promo||[];
  const por_loja_promo      = RAW.por_loja_promo||[];
  const evolucao_promo      = RAW.evolucao_promo||[];
  const alertas_promo_sem_id= RAW.alertas_promo_sem_id||[];
  const por_loja_fid        = RAW.por_loja_fid||[];
  const evolucao_fid        = RAW.evolucao_fid||[];
  const alertas_fid_alta    = por_loja_fid.filter(l=>l.pct_bruto>15);
  const kpis_promo={total:kraw.total_desconto_promo||0, a_ressarcir:kraw.promo_a_ressarcir||0, sem_id_val:kraw.promo_sem_id_val||0, n_campanhas:kraw.promo_n_campanhas||0, n_cupons:kraw.promo_n_cupons||0, sem_id_count:kraw.promo_sem_id||0};
  const kpis_fid  ={total:kraw.total_desconto_fidelidade||0, n_cupons:kraw.fid_n_cupons||0, n_itens:kraw.fid_n_itens||0, pct_bruto:kraw.fid_pct_bruto||0, ticket:kraw.fid_ticket||0};

  // ── Manual
  const vencItems=itens.filter(i=>isVenc(i.tag||''));
  const totalManual=sum(itens,'desconto'), totalBruto=sum(itens,'bruto'), totalLiquido=sum(itens,'liquido');
  const vencBruto=sum(vencItems,'bruto'), vencLiquido=sum(vencItems,'liquido'), vencDesc=sum(vencItems,'desconto');
  const skuVC={}; vencItems.forEach(i=>{if(!skuVC[i.sku])skuVC[i.sku]={count:0,produto:i.produto,desconto:0,bruto:0}; skuVC[i.sku].count++; skuVC[i.sku].desconto+=+i.desconto; skuVC[i.sku].bruto+=+i.bruto;});

  const pcMap={};
  itens.forEach(m=>{ const t=m.tag||'Sem tag'; if(!pcMap[t])pcMap[t]={tag:t,total_desconto:0,total_bruto:0,total_liquido:0,total_qtd:0,cupons:new Set(),skus:new Set(),alertas:0,venc:isVenc(t),grupo:getTagGroup(t)}; const c=pcMap[t]; c.total_desconto+=+m.desconto; c.total_bruto+=+m.bruto; c.total_liquido+=+m.liquido; c.total_qtd+=+m.qtd; c.cupons.add(m.chave_cupom); c.skus.add(m.sku); if(m.alerta)c.alertas++; });
  const por_campanha=Object.values(pcMap).map(c=>({...c,n_cupons:c.cupons.size,n_skus:c.skus.size,pct_medio:c.total_bruto>0?c.total_desconto/c.total_bruto*100:0,taxa_recuperacao:c.total_bruto>0?c.total_liquido/c.total_bruto*100:0})).sort((a,b)=>b.total_desconto-a.total_desconto);

  const plMap={};
  itens.forEach(i=>{ const l=i.loja; if(!plMap[l])plMap[l]={loja:l,codigo_loja:i.codigo_loja,manual:0,bruto:0,liquido:0,qtd:0,cupons:new Set(),alertas:0,venc_bruto:0,venc_liquido:0,fidelidade:0,promo:0}; const lj=plMap[l]; lj.manual+=+i.desconto; lj.bruto+=+i.bruto; lj.liquido+=+i.liquido; lj.qtd+=+i.qtd; lj.cupons.add(i.chave_cupom); if(i.alerta)lj.alertas++; if(isVenc(i.tag||'')){lj.venc_bruto+=+i.bruto;lj.venc_liquido+=+i.liquido;} });
  const por_loja=Object.values(plMap).map(l=>({...l,n_cupons:l.cupons.size,custo:l.manual+l.fidelidade,pct_manual:l.bruto>0?l.manual/l.bruto*100:0})).sort((a,b)=>b.manual-a.manual);

  const mesMap={}; vencItems.forEach(i=>{const mk=monthKey(i.data);if(!mesMap[mk])mesMap[mk]={mes:mk,bruto:0,liquido:0,desconto:0,qtd:0,skus:new Set()};mesMap[mk].bruto+=+i.bruto;mesMap[mk].liquido+=+i.liquido;mesMap[mk].desconto+=+i.desconto;mesMap[mk].qtd+=+i.qtd;mesMap[mk].skus.add(i.sku);});
  const evolucao_venc=Object.values(mesMap).map(m=>({...m,n_skus:m.skus.size})).sort((a,b)=>a.mes.localeCompare(b.mes));

  const skuRec=Object.entries(skuVC).filter(([,v])=>v.count>1).length;
  const topSkus=Object.entries(skuVC).sort((a,b)=>b[1].count-a[1].count).slice(0,10).map(([sku,v])=>({sku,...v}));
  const linhaMap={}; vencItems.forEach(i=>{const l=i.linha||'Sem linha';if(!linhaMap[l])linhaMap[l]={linha:l,bruto:0,liquido:0,qtd:0};linhaMap[l].bruto+=+i.bruto;linhaMap[l].liquido+=+i.liquido;linhaMap[l].qtd+=+i.qtd;});
  const topLinhas=Object.values(linhaMap).sort((a,b)=>b.bruto-a.bruto).slice(0,8);

  // ── Giro de vencimento próximo ────────────────
  const listaVenc = RAW.lista_vencimento || [];
  const vendasVencIdx = {};
  vencItems.forEach(i => {
    const k = i.codigo_loja + '|' + i.sku;
    if(!vendasVencIdx[k]) vendasVencIdx[k] = 0;
    vendasVencIdx[k] += +i.qtd;
  });
  const listaIdx2 = {};
  listaVenc.forEach(item => {
    const k = item.bcps + '|' + item.sku;
    if(!listaIdx2[k]) listaIdx2[k] = {loja:item.loja, bcps:item.bcps, sku:item.sku, descricao:item.descricao, qtd_lista:0};
    listaIdx2[k].qtd_lista += item.quantidade;
  });
  const giroRows = Object.values(listaIdx2).map(item => {
    const qtd_vendida = vendasVencIdx[item.bcps + '|' + item.sku] || 0;
    return {...item, qtd_vendida, vazao: item.qtd_lista > 0 ? Math.round(qtd_vendida / item.qtd_lista * 1000) / 10 : 0};
  });
  const giroLojaMap = {};
  giroRows.forEach(r => {
    if(!giroLojaMap[r.bcps]) giroLojaMap[r.bcps] = {loja:r.loja, bcps:r.bcps, qtd_lista:0, qtd_vendida:0, skus:0, skus_girados:0};
    const l = giroLojaMap[r.bcps];
    l.qtd_lista  += r.qtd_lista;
    l.qtd_vendida+= r.qtd_vendida;
    l.skus++;
    if(r.qtd_vendida > 0) l.skus_girados++;
  });
  const giroLojas = Object.values(giroLojaMap).map(l => ({...l, vazao: l.qtd_lista > 0 ? Math.round(l.qtd_vendida/l.qtd_lista*1000)/10 : 0})).sort((a,b)=>b.vazao-a.vazao);
  const giroTotal = {qtd_lista: giroRows.reduce((s,r)=>s+r.qtd_lista,0), qtd_vendida: giroRows.reduce((s,r)=>s+r.qtd_vendida,0), skus: giroRows.length, skus_girados: giroRows.filter(r=>r.qtd_vendida>0).length};
  giroTotal.vazao = giroTotal.qtd_lista > 0 ? Math.round(giroTotal.qtd_vendida/giroTotal.qtd_lista*1000)/10 : 0;
  // Itens vendidos com tag venc fora da lista (transgressão por loja)
  const listaChavesGiro = new Set(listaVenc.map(i => i.bcps+'|'+i.sku));
  vencItems.forEach(i => {
    const k = i.codigo_loja+'|'+i.sku;
    if(!listaChavesGiro.has(k)){
      if(!giroLojaMap[i.codigo_loja]) giroLojaMap[i.codigo_loja]={loja:i.loja,bcps:i.codigo_loja,qtd_lista:0,qtd_vendida:0,skus:0,skus_girados:0};
      if(!giroLojaMap[i.codigo_loja].transgressoes) giroLojaMap[i.codigo_loja].transgressoes=[];
      giroLojaMap[i.codigo_loja].transgressoes.push({sku:i.sku,produto:i.produto,qtd:+i.qtd,desconto:+i.desconto,tag:i.tag});
    }
  });
  // Recalcular giroLojas com transgressoes
  const giroLojasComTransg = Object.values(giroLojaMap).map(l => ({...l, vazao: l.qtd_lista>0?Math.round(l.qtd_vendida/l.qtd_lista*1000)/10:0, transgressoes:l.transgressoes||[]})).sort((a,b)=>(b.transgressoes.length+b.skus)-(a.transgressoes.length+a.skus));

  const totalAlertas=itens.filter(i=>i.alerta).length + kpis_promo.sem_id_count + alertas_fid_alta.length;
  const alertas_criticos=itens.filter(i=>i.pct>60);
  const alertas_normais=itens.filter(i=>i.alerta&&i.pct<=60);

  return {
    kpis:{ total_cupons:uniq(itens,'chave_cupom'), itens_manuais:itens.length, total_qtd:Math.round(sum(itens,'qtd')), total_manual:totalManual, total_fidelidade:kpis_fid.total, total_promo:kpis_promo.total, custo_franqueada:totalManual+kpis_fid.total, total_bruto:totalBruto, total_liquido:totalLiquido, pct_manual_bruto:totalBruto>0?totalManual/totalBruto*100:0, alertas:itens.filter(i=>i.alerta).length, alertas_criticos:alertas_criticos.length, campanhas_distintas:uniq(itens,'tag'), promo_sem_id:kpis_promo.sem_id_count, alertas_fid_alta:alertas_fid_alta.length, total_alertas:totalAlertas },
    saving:{ venc_bruto:vencBruto, venc_liquido:vencLiquido, venc_desconto:vencDesc, venc_qtd:Math.round(sum(vencItems,'qtd')), taxa_recuperacao:vencBruto>0?vencLiquido/vencBruto*100:0, n_itens:vencItems.length, n_skus:uniq(vencItems,'sku'), n_cupons:uniq(vencItems,'chave_cupom'), skus_recorrentes:skuRec, pct_do_custo_manual:totalManual>0?vencDesc/totalManual*100:0 },
    por_campanha, por_loja, itens, alertas:alertas_normais, alertas_criticos, vencimento:vencItems, evolucao_venc, topSkus, topLinhas,
    por_campanha_promo, por_loja_promo, evolucao_promo, alertas_promo_sem_id,
    por_loja_fid, evolucao_fid, alertas_fid_alta,
    kpis_promo, kpis_fid,
    giro:{ total:giroTotal, lojas:giroLojasComTransg, rows:giroRows }
  };
}

  const tagLabel=F.tags.length===0?'Todas as tags':F.tags.length+' tag'+(F.tags.length>1?'s':'')+' selecionada'+(F.tags.length>1?'s':'');

    '<div class="filter-group"><label>Data fim</label><input type="date" value="'+F.dataFim+'" onchange="F.dataFim=this.value;F.mes=\'\';applyFilters();renderFilterBar();renderDataSection()"></div>'+
    '<div class="filter-group"><label>Grupo de tag</label><select onchange="F.grupo=this.value;applyFilters();renderFilterBar();renderDataSection()">'+grupoOpts+'</select></div>'+
    '<div class="filter-group">'+
      '<label>Tag / Ação Manual</label>'+
      '<div class="ms-wrap" id="ms-wrap">'+
        '<div class="ms-trigger" id="ms-trigger" onclick="toggleMS(event)"><span id="ms-trigger-label">'+tagLabel+'</span><span class="ms-arrow">▾</span></div>'+
        '<div class="ms-dropdown" id="ms-dropdown" style="display:none" onclick="event.stopPropagation()">'+
          '<input class="ms-search-inp" id="ms-search-inp" type="text" placeholder="Pesquisar tag..." value="'+esc(msSearch)+'" oninput="filterMSTags(this.value)">'+
          '<div class="ms-list" id="ms-list"></div>'+
          '<div class="ms-footer"><span><span id="ms-footer-count"></span> tags</span><a onclick="clearAllTags()">Limpar seleção</a></div>'+
        '</div>'+
        chipsHtml+
      '</div>'+
    '</div>'+
    '<div style="align-self:flex-end"><button class="btn btn-ghost" onclick="F={mes:\'\',dataIni:\'\',dataFim:\'\',tags:[],grupo:\'\'};msSearch=\'\';applyFilters();renderFilterBar();renderDataSection()">✕ Limpar</button></div>'+
    '<div class="filter-results" id="filter-results">'+(D?N(D.itens.length)+' itens manuais'+(filtrado?' (filtrado)':''):'-')+'</div>'+
  '</div>'+
  '<div class="periodo-bar">'+
    '<span>Período: <strong>'+(RAW.periodo&&RAW.periodo.inicio||'')+'</strong> até <strong>'+(RAW.periodo&&RAW.periodo.fim||'')+'</strong> ('+(RAW.periodo&&RAW.periodo.dias||0)+' dias)</span>'+
    '<span>Gerado em: <strong>'+RAW.gerado_em+'</strong></span>'+
    '<span>Alerta Manual: <strong>&gt;'+RAW.threshold_alerta+'%</strong></span>'+
  '</div>';

  renderMSList();
  if(msOpen){ const dd=document.getElementById('ms-dropdown'); if(dd) dd.style.display='flex'; }

function closeMSIfOutside(e){ if(!e.target.closest('#ms-wrap')){ msOpen=false; const dd=document.getElementById('ms-dropdown'),tr=document.getElementById('ms-trigger'); if(dd) dd.style.display='none'; if(tr) tr.className='ms-trigger'; } }

function renderDataSection(){
  const el=document.getElementById('data-section'); if(!el||!D) return;
  const k=D.kpis, sv=D.saving, kp=D.kpis_promo, kf=D.kpis_fid;

  el.innerHTML=
  '<div class="section-title">Visão Geral — Descontos Manuais</div>'+
  '<div class="kpi-grid">'+
    buildSavingHeroKpi(sv)+
    kpiCard('c-navy','Desconto Manual Total',R(k.total_manual),P(k.pct_manual_bruto)+' do valor bruto')+
    kpiCard('c-brand','Receita Gerada (Líquido)',R(k.total_liquido),'valor líquido com desconto manual')+
    kpiCard('c-green','Qtd. Itens Vendidos',N(k.total_qtd),N(k.itens_manuais)+' linhas · '+N(k.total_cupons)+' cupons')+
    kpiCard('c-promo','Promocional (a Ressarcir)',R(kp.a_ressarcir),'pago pela franqueadora via BSO')+
    kpiCard('c-fid','Fidelidade',R(kf.total),'custo da franqueada · '+N(kf.n_cupons)+' cupons')+

      savingKpi(true,'Valor Gerado (Líquido)',R(sv.venc_liquido),'Receita que entrou no caixa')+
      savingKpi(true,'Perda Evitada (Valor Bruto)',R(sv.venc_bruto),'Seria 100% perdido sem a ação')+
      savingKpi(false,'Taxa de Recuperação',P(sv.taxa_recuperacao),'Líquido ÷ Bruto')+

      savingKpi(false,'Qtd. Itens Girados',N(sv.venc_qtd),N(sv.n_skus)+' SKUs · '+N(sv.n_cupons)+' cupons')+
      savingKpi(false,'SKUs Recorrentes',N(sv.skus_recorrentes),'mesmo SKU em múltiplos cupons')+
    '</div>'+
    '<div class="saving-note">Saving = Valor Líquido recuperado. Sem a ação de desconto, esses produtos seriam descartados com perda de 100% do valor de custo.</div>'+
  '</div>'+

function savingKpi(hl,label,value,sub){ return '<div class="saving-kpi'+(hl?' highlight':'')+'"><div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub">'+sub+'</div></div>'; }

// ── Giro por loja ─────────────────────────────────────────────────
function renderGiro(){
  const g = D.giro;
  if(!g || !g.lojas.length){
    return '<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;color:var(--muted);font-size:13px">Lista de vencimento próximo não carregada. Execute o merge.py para habilitar o giro.</div>';
  }
  const gt = g.total;
  // KPIs de giro
  let html = '<div class="kpi-grid" style="margin-bottom:14px">'
    + kpiCard('c-brand','Vazão Geral',P(gt.vazao), N(gt.qtd_vendida)+' vendidos de '+N(gt.qtd_lista)+' listados')
    + kpiCard('c-green','SKUs Girados',N(gt.skus_girados)+' / '+N(gt.skus),'SKUs com ao menos 1 venda com tag vencimento')
    + kpiCard('c-red','Transgressões',N(g.lojas.reduce((s,l)=>s+l.transgressoes.length,0)),'vendas com tag venc em SKU não autorizado')
    + kpiCard('c-yellow','SKUs Parados',N(gt.skus - gt.skus_girados),'na lista mas sem venda registrada')
    + '</div>';

  // Tabela por loja — expansível
  html += '<div class="table-wrap"><table><thead><tr>'
    + '<th>Loja</th><th>Qtd Lista</th><th>Qtd Vendida</th><th>Vazão</th>'
    + '<th>SKUs Girados</th><th>Transgressões</th><th>Situação</th>'
    + '</tr></thead><tbody>';

  g.lojas.forEach(l => {
    const temTransg = l.transgressoes.length > 0;
    const semVenda  = l.qtd_lista > 0 && l.qtd_vendida === 0;
    const excesso   = l.qtd_vendida > l.qtd_lista && l.qtd_lista > 0;
    const rowClass  = temTransg ? 'alerta-crit-row' : excesso ? 'alerta-row' : semVenda ? '' : 'venc-row';
    const barColor  = temTransg||excesso ? 'var(--red)' : l.vazao>=80 ? 'var(--green)' : l.vazao>0 ? 'var(--brand-green)' : 'var(--muted)';
    const barW      = Math.min(l.vazao||0, 100);

    // Situação descritiva
    let situacao = '';
    if(temTransg)  situacao += '<span class="transgression-badge tb-nao-listado" style="margin:1px">⚠ '+l.transgressoes.length+' fora da lista</span>';
    if(excesso)    situacao += '<span class="transgression-badge tb-excesso" style="margin:1px">↑ excedeu lista</span>';
    if(semVenda && l.qtd_lista>0) situacao += '<span class="transgression-badge tb-sem-venda" style="margin:1px">sem giro</span>';
    if(!temTransg && !excesso && !semVenda && l.qtd_lista>0) situacao += '<span class="transgression-badge tb-ok" style="margin:1px">OK</span>';

    html += '<tr class="'+rowClass+'">'
      + '<td><strong>'+esc(l.loja||l.bcps)+'</strong><br><span style="color:var(--muted);font-size:10px">#'+esc(l.bcps)+'</span></td>'
      + '<td>'+N(l.qtd_lista)+'</td>'
      + '<td>'+(excesso?'<strong style="color:var(--red)">'+N(l.qtd_vendida)+'</strong>':N(l.qtd_vendida))+'</td>'
      + '<td><div class="vazao-bar-wrap"><div class="vazao-bar"><div class="vazao-fill" style="width:'+barW+'%;background:'+barColor+'"></div></div><span style="font-size:12px;font-weight:600;color:'+barColor+'">'+P(l.vazao)+'</span></div></td>'
      + '<td>'+N(l.skus_girados)+' / '+N(l.skus)+'</td>'
      + '<td>'+(temTransg ? '<span style="font-weight:700;color:var(--red)">'+l.transgressoes.length+'</span>' : '<span style="color:var(--muted)">—</span>')+'</td>'
      + '<td style="min-width:160px">'+situacao+'</td>'
      + '</tr>';

    // Detalhe de transgressões inline
    if(temTransg){
      const uniqTransg = {};
      l.transgressoes.forEach(t => { const k=t.sku; if(!uniqTransg[k])uniqTransg[k]={...t,qtd_total:0,desconto_total:0}; uniqTransg[k].qtd_total+=t.qtd; uniqTransg[k].desconto_total+=t.desconto; });
      Object.values(uniqTransg).forEach(t => {
        html += '<tr style="background:#FFF5F5">'
          + '<td colspan="2" style="padding-left:32px;font-size:12px;color:var(--muted)">↳ <strong style="color:var(--red)">Fora da lista:</strong> '+esc(t.produto)+'</td>'
          + '<td colspan="2" style="font-size:12px">SKU <span style="font-family:monospace">'+esc(t.sku)+'</span> · '+N(Math.round(t.qtd_total))+' un. vendidas</td>'
          + '<td colspan="2" style="font-size:12px">Desconto dado: <strong style="color:var(--red)">'+R(t.desconto_total)+'</strong></td>'
          + '<td><span class="badge badge-g-venc" style="font-size:10px">'+esc(t.tag)+'</span></td>'
          + '</tr>';
      });
    }

    // Detalhe de excesso inline
    if(excesso && l.qtd_lista > 0){
      html += '<tr style="background:#FFFBEB">'
        + '<td colspan="2" style="padding-left:32px;font-size:12px;color:var(--muted)">↳ <strong style="color:var(--yellow)">Excedeu a lista:</strong></td>'
        + '<td colspan="4" style="font-size:12px">Listados: <strong>'+N(l.qtd_lista)+'</strong> · Vendidos: <strong style="color:var(--yellow)">'+N(l.qtd_vendida)+'</strong> · Excesso: <strong style="color:var(--yellow)">+'+N(l.qtd_vendida-l.qtd_lista)+'</strong> unidades</td>'
        + '<td></td>'
        + '</tr>';
    }
  });

  html += '</tbody></table></div>';
  html += '<div style="font-size:11px;color:var(--muted);margin-top:6px;padding:0 4px">Vazão = qtd vendida com tag vencimento ÷ qtd informada na lista de vencimento próximo. <a href="#" onclick="setPage(\'auditoria\');return false" style="color:var(--brand-green);font-weight:600">Ver auditoria detalhada →</a></div>';
  return html;
}

// ── Eficiência ────────────────────────────────────────────────────
function renderEficiencia(){
  const sv=D.saving;
  const roi=sv.venc_desconto>0?sv.venc_liquido/sv.venc_desconto:0;
  const ticket=sv.n_cupons>0?sv.venc_liquido/sv.n_cupons:0;
  const descMedio=sv.n_itens>0?sv.venc_desconto/sv.n_itens:0;
  const cards=[
    {label:'ROI do Desconto de Vencimento',value:roi.toFixed(2)+'x',sub:'Para cada R$1 de desconto gera R$'+roi.toFixed(2)+' de receita',color:'var(--teal)',pct:Math.min(roi/5*100,100)},
    {label:'Taxa de Recuperação',value:P(sv.taxa_recuperacao),sub:'% do valor bruto recuperado como receita',color:'var(--green)',pct:sv.taxa_recuperacao},
    {label:'% Custo Manual em Vencimento',value:P(sv.pct_do_custo_manual),sub:'Participação das ações de vencimento no total Manual',color:'var(--blue)',pct:sv.pct_do_custo_manual},
    {label:'Ticket Médio por Cupom',value:R(ticket),sub:'Receita média por cupom com ação de vencimento',color:'var(--accent)',pct:0},
    {label:'Desconto Médio por Item',value:R(descMedio),sub:'Custo médio de desconto por item girado',color:'var(--orange)',pct:0},
    {label:'SKUs Recorrentes em Vencimento',value:N(sv.skus_recorrentes),sub:'Sinal de problema de compra ou gestão de estoque',color:'var(--red)',pct:0},
  ];
  let html='<div class="eff-grid">';
  cards.forEach(c=>{
    html+='<div class="eff-card"><div class="eff-label">'+c.label+'</div><div class="eff-value" style="color:'+c.color+'">'+c.value+'</div><div style="font-size:11px;color:var(--muted);margin-top:3px">'+c.sub+'</div>';
    if(c.pct) html+='<div class="eff-bar"><div class="eff-bar-fill" style="width:'+Math.min(c.pct,100).toFixed(0)+'%;background:'+c.color+'"></div></div>';
    html+='</div>';
  });
  html+='</div>';
  html+='<div style="margin-top:12px" class="top-grid">';
  html+='<div class="top-card"><div class="top-card-title">Top SKUs Recorrentes em Vencimento</div>';
  if(!D.topSkus.length) html+='<div style="padding:16px;color:var(--muted);font-size:12px">Nenhum item de vencimento</div>';
  else D.topSkus.forEach((s,i)=>{ html+='<div class="top-item"><div class="top-rank">'+(i+1)+'</div><div class="top-info"><div class="name">'+esc(s.produto)+'</div><div class="sub">'+esc(s.sku)+'</div></div><div class="top-val"><span class="badge badge-red">'+s.count+'x</span></div></div>'; });
  html+='</div>';
  html+='<div class="top-card"><div class="top-card-title">Top Linhas em Vencimento (Receita)</div>';
  if(!D.topLinhas.length) html+='<div style="padding:16px;color:var(--muted);font-size:12px">Nenhum item de vencimento</div>';
  else D.topLinhas.forEach((l,i)=>{ html+='<div class="top-item"><div class="top-rank">'+(i+1)+'</div><div class="top-info"><div class="name">'+esc(l.linha)+'</div><div class="sub">'+N(Math.round(l.qtd))+' itens</div></div><div class="top-val">'+R(l.liquido)+'</div></div>'; });
  html+='</div>';
  const maxLiq=Math.max(...D.evolucao_venc.map(m=>m.liquido),1);
  html+='<div class="top-card"><div class="top-card-title">Evolução Mensal do Saving</div>';
  if(!D.evolucao_venc.length) html+='<div style="padding:16px;color:var(--muted);font-size:12px">Nenhum item de vencimento</div>';
  else D.evolucao_venc.forEach(m=>{ html+='<div class="top-item"><div class="top-rank" style="width:44px">'+monthLabel(m.mes)+'</div><div class="top-info"><div class="bar-bg" style="height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:4px"><div class="bar-fill teal" style="width:'+Math.round(m.liquido/maxLiq*100)+'%;height:100%"></div></div><div class="sub">'+N(m.n_skus)+' SKUs · '+N(Math.round(m.qtd))+' itens</div></div><div class="top-val">'+R(m.liquido)+'</div></div>'; });
  html+='</div></div>';
  return html;
}

// ── Tabs ──────────────────────────────────────────────────────────
function setTab(t){ activeTab=t; document.querySelectorAll('.tab').forEach(el=>{ el.className='tab'+(el.getAttribute('onclick').indexOf("'"+t+"'")>=0?' active':''); }); renderTabContent(); }

function renderTabContent(){
  const el=document.getElementById('tab-content'); if(!el) return;
  if(activeTab==='campanhas')   el.innerHTML=renderCampanhas();
  else if(activeTab==='lojas')       el.innerHTML=renderLojas();
  else if(activeTab==='itens')       el.innerHTML=renderItens();
  else if(activeTab==='alertas')     el.innerHTML=renderAlertas();
  else if(activeTab==='vencimento')  el.innerHTML=renderVencimento();
  else if(activeTab==='promo')       el.innerHTML=renderPromo();
  else if(activeTab==='fidelidade')  el.innerHTML=renderFidelidade();
}

// ── Tab: Promocional ──────────────────────────────────────────────
function renderPromo(){
  const kp=D.kpis_promo;

  // KPIs Promo

    +'<div class="kpi c-promo"><div class="label">Total Promocional</div><div class="value">'+R(kp.total)+'</div><div class="sub">desconto aplicado pela franqueadora</div></div>'

    +(kp.sem_id_count>0
      ?'<div class="kpi c-red"><div class="label">Sem ID — Não Ressarcido</div><div class="value">'+R(kp.sem_id_val)+'</div><div class="sub">'+N(kp.sem_id_count)+' itens sem ID de campanha</div></div>'
      :'<div class="kpi c-green"><div class="label">Itens sem ID</div><div class="value">0</div><div class="sub">todos os itens com campanha identificada</div></div>')
    +'<div class="kpi c-blue"><div class="label">Cupons com Promocional</div><div class="value">'+N(kp.n_cupons)+'</div><div class="sub">cupons que receberam desconto da franqueadora</div></div>'

// ── Helpers de tabela ─────────────────────────────────────────────
function thRow(tab,cols,activeCol,activeAsc){
  return '<tr>'+cols.map(c=>{ const active=c.k===activeCol; const arrow=active?(activeAsc?' &#9650;':' &#9660;'):''; return '<th onclick="doSort(\''+tab+'\',\''+c.k+'\')">'+c.l+arrow+'</th>'; }).join('')+'</tr>';
}
function tableWrap(thead,tbody,total,page,tab){
  const totalPages=Math.ceil(total/PAGE_SIZE);
  let pag='';
  if(totalPages>1){
    const prev=page>1?'<button onclick="setPage(\''+tab+'\','+(page-1)+')">&#8249;</button>':'';
    const next=page<totalPages?'<button onclick="setPage(\''+tab+'\','+(page+1)+')">&#8250;</button>':'';
    let nums='';
    for(let i=1;i<=Math.min(totalPages,7);i++) nums+='<button class="'+(i===page?'active':'')+'" onclick="setPage(\''+tab+'\','+i+')">'+i+'</button>';
    pag='<div class="pagination">'+prev+nums+next+'<span>'+N((page-1)*PAGE_SIZE+1)+'–'+N(Math.min(page*PAGE_SIZE,total))+' de '+N(total)+'</span></div>';
  }
  return '<div class="table-wrap"><table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>'+pag+'</div>';
}
function doSort(tab,col){ const cur=sortState[tab]; sortState[tab]={col,asc:cur&&cur.col===col?!cur.asc:false}; if(pages[tab]) pages[tab]=1; renderTabContent(); }
function setPage(tab,p){ pages[tab]=p; renderTabContent(); }

// ── Navegação de páginas ──────────────────────────────────────────
let currentPage = 'dashboard';

function setPage(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.className = 'nav-item' + (el.id === 'nav-'+page ? ' active' : '');
  });
  if(page === 'auditoria'){
    document.getElementById('filter-section').innerHTML = '';
    document.getElementById('data-section').innerHTML = renderAuditoria();
  } else {
    applyFilters(); renderFilterBar(); renderDataSection();
  }
}

// ── Auditoria ─────────────────────────────────────────────────────
function normLoja(s){
  return (s||'').toUpperCase()
    .replace(/^\d+\s+/,'')
    .replace(/[ÁÀÂÃÄ]/g,'A').replace(/[ÉÈÊË]/g,'E').replace(/[ÍÌÎÏ]/g,'I')
    .replace(/[ÓÒÔÕÖ]/g,'O').replace(/[ÚÙÛÜ]/g,'U').replace(/Ç/g,'C')
    .replace(/[^A-Z0-9]/g,' ').replace(/\s+/g,' ').trim();
}

function renderAuditoria(){
  if(!RAW){ return '<div class="state"><div class="icon">⏳</div><div>Aguardando dados...</div></div>'; }
  const lista = RAW.lista_vencimento || [];
  if(!lista.length){
    return '<div class="state"><div class="icon">📋</div><div><strong>Lista de vencimento não carregada</strong></div><div style="font-size:12px;margin-top:8px">Execute o merge.py para incluir o arquivo CSV no dados.json</div></div>';
  }

  // Indexar lista por bcps+sku e por lojanorm+sku
  const listaIdx = {};
  lista.forEach(item => {
    const k1 = item.bcps + '|' + item.sku;
    if(!listaIdx[k1]) listaIdx[k1] = {...item, qtd_total: 0};
    listaIdx[k1].qtd_total += item.quantidade;
    const k2 = normLoja(item.loja) + '|' + item.sku;
    if(!listaIdx[k2]) listaIdx[k2] = {...item, qtd_total: 0};
    listaIdx[k2].qtd_total += item.quantidade;
  });

  // Indexar vendas venc por codigo_loja+sku
  const vendasIdx = {};
  (RAW.itens_todos || []).filter(i => isVenc(i.tag||'')).forEach(i => {
    const k = i.codigo_loja + '|' + i.sku;
    if(!vendasIdx[k]) vendasIdx[k] = {loja:i.loja, codigo_loja:i.codigo_loja, sku:i.sku, produto:i.produto, linha:i.linha, tag:i.tag, qtd:0, desconto:0, bruto:0};
    vendasIdx[k].qtd     += +i.qtd;
    vendasIdx[k].desconto+= +i.desconto;
    vendasIdx[k].bruto   += +i.bruto;
  });

  // Para cada item da lista, calcular vazão
  const vazaoRows = [];
  const listaVistos = new Set();
  lista.forEach(item => {
    const k = item.bcps + '|' + item.sku;
    if(listaVistos.has(k)) return;
    listaVistos.add(k);
    const qtd_lista = listaIdx[k]?.qtd_total || item.quantidade;
    // Tentar match por bcps=codigo_loja primeiro, depois por nome
    const venda = vendasIdx[item.bcps + '|' + item.sku]
                || vendasIdx[normLoja(item.loja) + '|' + item.sku]
                || null;
    const qtd_vendida = venda ? venda.qtd : 0;
    const vazao = qtd_lista > 0 ? (qtd_vendida / qtd_lista * 100) : 0;
    vazaoRows.push({
      bcps: item.bcps, loja_csv: item.loja, sku: item.sku,
      descricao: item.descricao, categoria: item.categoria,
      validade: item.validade, rbv: item.rbv,
      qtd_lista, qtd_vendida,
      vazao: Math.round(vazao * 10) / 10,
      excesso: qtd_vendida > qtd_lista,
      sem_venda: qtd_vendida === 0,
    });
  });

  // Transgressões: venda com tag venc em SKU não listado
  const listaChaves = new Set(lista.map(i => i.bcps + '|' + i.sku));
  const transgressoes = [];
  Object.values(vendasIdx).forEach(v => {
    const k = v.codigo_loja + '|' + v.sku;
    const kNorm = normLoja(v.loja) + '|' + v.sku;
    if(!listaChaves.has(k) && !listaChaves.has(kNorm)){
      transgressoes.push({...v});
    }
  });

  // KPIs de auditoria
  const totalLista    = lista.length;
  const comVenda      = vazaoRows.filter(r => r.qtd_vendida > 0).length;
  const semVenda      = vazaoRows.filter(r => r.sem_venda).length;
  const excessos      = vazaoRows.filter(r => r.excesso).length;
  const nTransg       = transgressoes.length;
  const vazaoMedia    = vazaoRows.length > 0 ? vazaoRows.reduce((s,r)=>s+r.vazao,0)/vazaoRows.length : 0;
  const totalQtdLista = vazaoRows.reduce((s,r)=>s+r.qtd_lista,0);
  const totalQtdVend  = vazaoRows.reduce((s,r)=>s+r.qtd_vendida,0);
  const vazaoGeral    = totalQtdLista > 0 ? totalQtdVend/totalQtdLista*100 : 0;

  // Render
  let html = '<div class="section-title">Indicadores de Auditoria — Vencimento Próximo</div>';
  html += '<div class="audit-grid">';
  html += auditKpi('c-brand','Vazão Geral de Estoque',P(vazaoGeral),N(totalQtdVend)+' de '+N(totalQtdLista)+' itens girados');
  html += auditKpi('c-blue','SKUs na Lista',N(totalLista),'itens informados como vencimento próximo');
  html += auditKpi('c-green','Com Venda Registrada',N(comVenda),'SKUs que tiveram ao menos 1 venda com tag venc');
  html += auditKpi('c-yellow','Sem Venda Registrada',N(semVenda),'estoque de vencimento parado — atenção');
  html += auditKpi('c-yellow','Vendas com Excesso',N(excessos),'vendeu mais do que o informado na lista');
  html += auditKpi('c-red','Transgressões (SKU não listado)',N(nTransg),'desconto venc aplicado em item não autorizado');
  html += '</div>';

  // Giro por loja
  html += '<div class="section-title" style="margin-top:16px">Giro de Itens de Vencimento Próximo — por Loja</div>';
  html += renderGiro();

  // Tabela de transgressões
  html += '<div class="section-title" style="margin-top:16px">Transgressões — Desconto Vencimento em SKU Não Autorizado</div>';
  if(!transgressoes.length){
    html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;color:var(--green);font-weight:600;text-align:center">✅ Nenhuma transgressão encontrada no período</div>';
  } else {
    const q = searches.auditoria_t ? searches.auditoria_t.toLowerCase() : '';
    const rows = transgressoes.filter(r=>!q||r.produto.toLowerCase().includes(q)||r.loja.toLowerCase().includes(q)||r.sku.includes(q));
    const maxD = Math.max(...rows.map(r=>r.desconto),1);
    const thead = thRow('audit_t',[{k:'loja',l:'Loja'},{k:'codigo_loja',l:'Cód.'},{k:'sku',l:'SKU'},{k:'produto',l:'Produto'},{k:'tag',l:'Tag Usada'},{k:'qtd',l:'Qtd Vendida'},{k:'desconto',l:'Desconto Dado'},{k:'bruto',l:'Bruto'}],'desconto',false);
    const tbody = rows.slice(0,PAGE_SIZE).map(r =>
      '<tr class="alerta-crit-row">'
      +'<td>'+esc(r.loja)+'</td>'
      +'<td style="font-size:11px;color:var(--muted)">'+esc(r.codigo_loja)+'</td>'
      +'<td style="font-family:monospace;font-size:11px">'+esc(r.sku)+'</td>'
      +'<td>'+esc(r.produto)+'</td>'
      +'<td><span class="badge badge-g-venc" style="font-size:10px">'+esc(r.tag)+'</span></td>'
      +'<td>'+N(Math.round(r.qtd))+'</td>'
      +'<td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill red" style="width:'+Math.round(r.desconto/maxD*100)+'%"></div></div>'+R(r.desconto)+'</div></td>'
      +'<td>'+R(r.bruto)+'</td>'
      +'</tr>'
    ).join('');
    html += '<div class="search-row"><input type="text" placeholder="Buscar produto, loja, SKU..." oninput="searches.auditoria_t=this.value;document.getElementById(\'data-section\').innerHTML=renderAuditoria()"><span class="count">'+N(rows.length)+' item(ns)</span></div>';
    html += tableWrap(thead,tbody,rows.length,1,'audit_t');
  }

  // Tabela de vazão por SKU
  html += '<div class="section-title" style="margin-top:16px">Vazão por SKU — Lista de Vencimento Próximo</div>';
  const qv = searches.auditoria_v ? searches.auditoria_v.toLowerCase() : '';
  const vazaoFilt = vazaoRows
    .filter(r=>!qv||r.descricao.toLowerCase().includes(qv)||r.loja_csv.toLowerCase().includes(qv)||r.sku.includes(qv))
    .sort((a,b)=>a.vazao-b.vazao);
  const theadV = thRow('audit_v',[{k:'loja_csv',l:'Loja'},{k:'sku',l:'SKU'},{k:'descricao',l:'Produto'},{k:'categoria',l:'Categoria'},{k:'validade',l:'Validade'},{k:'qtd_lista',l:'Qtd Lista'},{k:'qtd_vendida',l:'Qtd Vendida'},{k:'vazao',l:'Vazão %'}],'vazao',true);
  const tbodyV = vazaoFilt.slice(0,PAGE_SIZE).map(r => {
    const color = r.excesso?'var(--yellow)':r.qtd_vendida===0?'var(--muted)':r.vazao>=80?'var(--green)':'var(--blue)';
    const barColor = r.excesso?'gold':r.qtd_vendida===0?'':'green';
    const barW = Math.min(r.vazao,100);
    const status = r.excesso
      ? '<span class="transgression-badge tb-excesso">Excesso</span>'
      : r.sem_venda
        ? '<span class="transgression-badge tb-sem-venda">Sem venda</span>'
        : r.vazao >= 100
          ? '<span class="transgression-badge tb-ok">100%</span>'
          : '<span class="transgression-badge tb-ok">'+P(r.vazao)+'</span>';
    return '<tr class="'+(r.excesso?'alerta-row':r.sem_venda?'':'venc-row')+'">'
      +'<td>'+esc(r.loja_csv)+'<br><span style="color:var(--muted);font-size:10px">BCPS '+esc(r.bcps)+'</span></td>'
      +'<td style="font-family:monospace;font-size:11px">'+esc(r.sku)+'</td>'
      +'<td>'+esc(r.descricao)+'</td>'
      +'<td><span class="badge badge-blue" style="font-size:10px">'+esc(r.categoria)+'</span></td>'
      +'<td style="font-size:11px">'+esc(r.validade)+'</td>'
      +'<td>'+N(r.qtd_lista)+'</td>'
      +'<td>'+N(r.qtd_vendida)+'</td>'
      +'<td><div class="vazao-bar-wrap"><div class="vazao-bar"><div class="vazao-fill bar-fill '+barColor+'" style="width:'+barW+'%;background:'+color+'"></div></div>'+status+'</div></td>'
      +'</tr>';
  }).join('');
  html += '<div class="search-row"><input type="text" placeholder="Buscar produto, loja, SKU..." oninput="searches.auditoria_v=this.value;document.getElementById(\'data-section\').innerHTML=renderAuditoria()"><span class="count">'+N(vazaoFilt.length)+' itens</span></div>';
  html += tableWrap(theadV,tbodyV,vazaoFilt.length,1,'audit_v');

  return html;
}

function auditKpi(cls,label,value,sub){
  return '<div class="audit-kpi '+cls+'"><div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub">'+sub+'</div></div>';
}

// ── Fechar dropdown no clique externo ─────────────────────────────
document.addEventListener('click',e=>{ if(!e.target.closest('#ms-wrap')){ msOpen=false; const dd=document.getElementById('ms-dropdown'),tr=document.getElementById('ms-trigger'); if(dd) dd.style.display='none'; if(tr) tr.className='ms-trigger'; } });

// ── Carga de dados ────────────────────────────────────────────────
fetch('dados.json?v='+Date.now())
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data=>{
    const itens_todos=(data.itens||[]).map(i=>Object.assign({},i,{origem:'MANUAL'}));
    RAW=Object.assign({},data,{itens_todos});
    document.getElementById('meta-header').innerHTML=
      (data.periodo?.inicio||'')+' a '+(data.periodo?.fim||'')+'<br>'+data.gerado_em;
    const sf = document.getElementById('sidebar-footer');
    if(sf) sf.innerHTML=(data.periodo?.inicio||'')+' a<br>'+(data.periodo?.fim||'')+'<br>'+data.gerado_em;
    applyFilters();
    renderFilterBar();
    renderDataSection();
  })
  .catch(err=>{
    document.getElementById('data-section').innerHTML=
      '<div class="state"><div class="icon">✕</div><div><strong>Não foi possível carregar dados.json</strong></div>'
      +'<div style="margin-top:8px;font-size:12px">'+esc(err.message)+'<br><br>Abra via servidor HTTP ou acesse pelo GitHub Pages.</div></div>';
  });
</script>
